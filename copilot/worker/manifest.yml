# The manifest for the "worker" service.
# Docs: https://aws.github.io/copilot-cli/docs/manifest/backend-service/

name: worker
type: Backend Service

image:
  build: Dockerfile.worker

cpu: 256
memory: 512
count: 1
exec: true

network:
  connect: true

variables:
  # Email (Resend)
  EMAIL_PROVIDER: "resend"
  RESEND_FROM_EMAIL: "noreply@sozofitness.com"

secrets:
  DATABASE_URL: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/DATABASE_URL
  RESEND_API_KEY: /copilot/${COPILOT_APPLICATION_NAME}/${COPILOT_ENVIRONMENT_NAME}/secrets/RESEND_API_KEY


