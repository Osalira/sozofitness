services:
  postgres:
    image: postgres:16-alpine
    container_name: sozofitness-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sozofitness
      POSTGRES_PASSWORD: sozofitness
      POSTGRES_DB: sozofitness
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sozofitness"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
